{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} | D'Spa Hotel Admin{% endblock %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}" style="display: flex; align-items: center; gap: 12px; text-decoration: none;">
        <img src="{% static 'images/logo/logo de empresa.PNG' %}" alt="Logo" style="height: 40px; width: auto; border-radius: 6px;" onerror="this.style.display='none'">
        <span style="font-size: 1.3rem; font-weight: 700; color: #f4f2e6; letter-spacing: 0.5px;">D'Spa Hotel</span>
    </a>
</div>
{% endblock %}

{% block nav-global %}{% endblock %}
