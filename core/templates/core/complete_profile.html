{% extends 'core/base.html' %}
{% load static %}

{% block title %}Completar Perfil - D'Spa Hotel{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="auth-card">
                    <div class="auth-header">
                        <h2><i class="fas fa-id-card me-2"></i>Completar Perfil</h2>
                        <p>Complete sus datos personales para poder realizar reservaciones</p>
                    </div>
                    <form method="post" class="auth-form">
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-12">
                                <label for="id_document" class="form-label">Cédula / Pasaporte</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                                    <input type="text" name="id_document" class="form-control" id="id_document" placeholder="V-12345678" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="phone" class="form-label">Teléfono</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                    <input type="tel" name="phone" class="form-control" id="phone" placeholder="+58 424-1234567" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label for="birth_date" class="form-label">Fecha de Nacimiento</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-calendar"></i></span>
                                    <input type="date" name="birth_date" class="form-control" id="birth_date" required>
                                </div>
                            </div>
                            <div class="col-12">
                                <label for="address" class="form-label">Dirección</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-map-marker-alt"></i></span>
                                    <textarea name="address" class="form-control" id="address" rows="2" placeholder="Su dirección completa" required></textarea>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-reservation w-100 mt-4">
                            <i class="fas fa-check-circle me-2"></i>Completar Perfil
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
